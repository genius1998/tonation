<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Donation Overlay</title>
  <style>
    :root{
      /* 비율 고정 */
      --outer-w: 500px;
      --outer-h: 400px;

      --inner-w: 400px;
      --inner-h: 220px;

      /* 색 */
      --outer-bg: rgba(120,120,120,1);
      --blue: #3f86ff;
      --white: #ffffff;

      /* 폰트 */
      --font: "Pretendard","Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;

      /* 텍스트/썸네일 크기 (목표 이미지 느낌) */
      --thumb-size: 36px;
      --thumb-gap: 10px;

      --line1-size: 30px; /* [앙엔터]... */
      --line2-size: 30px; /* 님 30,900캐시... */
      --line-height: 1.12;
    }

    html, body{
      height: 100%;
      margin: 0;
      background: transparent;
      font-family: var(--font);
    }

    .stage{
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 18px;
      box-sizing: border-box;
    }

    .wrap{
      width: var(--outer-w);
      height: var(--outer-h);
      background: var(--outer-bg);
      border-radius: 10px;
      padding: 12px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* 내부 이미지 박스(각진 모서리) */
    .card-img{
      width: var(--inner-w);
      height: var(--inner-h);
      margin: 0 auto;
      border-radius: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #ffd56a, #ff8a00);
      display: grid;
      place-items: center;
      text-align: center;
    }

    .title{
      font-weight: 900;
      font-size: 56px;
      color: var(--white);
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 10px;
    }

    .amount-top{
      font-weight: 900;
      font-size: 52px;
      color: #ff2d2d;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    /* ✅ 목표 이미지처럼: 썸네일(좌) + 텍스트(우) = Grid로 고정 */
    .row{
  display: grid;
  grid-template-columns: var(--thumb-size) 1fr; /* 1줄은 썸네일 + 텍스트 */
  grid-template-rows: auto auto;                /* 2줄 */
  column-gap: var(--thumb-gap);
  row-gap: 4px;
  padding: 0 4px;
  padding-left: 30px;
  margin-top: 2px;
  align-items: start;
}

/* 썸네일은 1번째 줄에만 */
.thumb{
  grid-column: 1;
  grid-row: 1;
  width: var(--thumb-size);
  height: var(--thumb-size);
  border-radius: 999px; /* ✅ 원형 */
  overflow: hidden;     /* ✅ 원형 밖 잘라냄 */
}

/* 1줄 텍스트는 썸네일 오른쪽 */
.line1{
  grid-column: 2;
  grid-row: 1;
  font-size: var(--line1-size);
  font-weight: 500;
  color: var(--blue);
  line-height: 1.12;
}

/* ✅ 2줄 텍스트는 “전체 폭”을 쓰게 해서 썸네일 아래에서 시작 */
.line2{
  grid-column: 1 / -1; /* 전체 폭 */
  grid-row: 2;
  font-size: var(--line2-size);
  font-weight: 500;
  color: var(--white);
  line-height: 1.12;

  /* ✅ 여기서 2줄의 left-margin(들여쓰기) 조절 가능 */
  padding-left: 0px;   /* 0이면 완전 왼쪽부터 */
}

    .thumb img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 텍스트 블록 */
    .textblock{
      min-width: 0;
      color: var(--white);
      font-weight: 800;
      letter-spacing: -0.3px;
      line-height: var(--line-height);
    }

    /* ✅ 1줄/2줄을 “구조적으로 고정” (님이 이상하게 떨어지는 문제 제거) */
    .line1{
      font-size: var(--line1-size);
      color: var(--blue);
      /* 길면 줄바꿈 허용 */
      word-break: break-word;
    }
    .line2{
      margin-top: 4px;
      font-size: var(--line2-size);
      word-break: break-word;
    }

    .blue{ color: var(--blue); }
    .white{ color: var(--white); }

    .sub{
      margin-top: auto;
      text-align: center;
      font-size: 22px;
      font-weight: 500;
      color: rgba(255,255,255,0.95);
      letter-spacing: -0.2px;
      padding-bottom: 12px;
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="wrap">

      <div class="card-img">
        <div>
          <div class="title" id="titleText">킹받쥬</div>
          <div class="amount-top" id="amountTop">30,900</div>
        </div>
      </div>

      <div class="row">
  <div class="thumb">
    <img id="thumbImg" src="file:///C:/Users/com/tonation/thumbnail.jpg" />
  </div>

  <div class="line1" id="whoBlue">[앙엔터] 앙앙~진국 (Jinguk)</div>

  <div class="line2">
    <span>님 </span><span class="blue" id="amountBlue">30,900</span><span>캐시 후원 감사합니다!</span>
  </div>
</div>


      <div class="sub" id="subText">중독/계좌/양승민</div>
    </div>
  </div>

  <script>
    const data = {
      title: "킹받쥬",
      who: "[앙엔터] 앙앙~진국 (Jinguk)",
      amount: 30900,
      sub: "중독/계좌/양승민",
      thumbSrc: "file:///C:/Users/com/tonation/thumbnail.jpg"
    };

    const fmt = (n) => n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");

    function render(d){
      document.getElementById("titleText").textContent = d.title;

      const a = fmt(d.amount);
      document.getElementById("amountTop").textContent = a;
      document.getElementById("amountBlue").textContent = a;

      document.getElementById("whoBlue").textContent = d.who;
      document.getElementById("subText").textContent = d.sub;

      document.getElementById("thumbImg").src = d.thumbSrc;
    }

    render(data);

    window.updateAlert = (next) => {
      Object.assign(data, next);
      render(data);
    };
  </script>
</body>
</html>
